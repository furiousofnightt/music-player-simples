<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="FuriousMusic - Sua experiência premium de áudio.">
    <meta name="author" content="FURIOUSOFNIGHT">
    <title>FuriousMusic | Premium Player</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Roboto:wght@300;400;500&display=swap"
        rel="stylesheet">

    <!-- Icons and CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
</head>

<body>
    <div class="background-overlay"></div>

    <div class="glass-container">
        <header>
            <div class="logo-area">
                <i class="fas fa-compact-disc fa-spin-slow"></i>
                <a href="https://github.com/furiousofnightgames" target="_blank"
                    style="text-decoration: none; color: inherit;">
                    <h1>MUSIC <span>FLOW</span></h1>
                </a>
            </div>
            <p>Premium Audio Experience</p>
        </header>

        <main>
            <!-- Player Card -->
            <section class="player-card">
                <div class="visualizer-mock">
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                </div>

                <div class="song-info">
                    <h2 id="current-song">Selecione uma música</h2>
                    <span id="genre" class="genre-badge">Gênero: -</span>
                </div>

                <div class="progress-wrapper">
                    <span id="time-current" class="time-current">00:00</span>
                    <div class="progress-bar-container">
                        <input type="range" id="progress-bar" min="0" value="0" step="1">
                    </div>
                    <span id="time-duration" class="time-duration">00:00</span>
                </div>

                <div class="main-controls">
                    <button id="shuffle" class="mode-btn" title="Shuffle"><i class="fas fa-random"></i></button>
                    <button id="prev" class="control-btn" title="Previous"><i class="fas fa-step-backward"></i></button>
                    <button id="play" class="play-btn" title="Play/Pause"><i class="fas fa-play"></i></button>
                    <button id="next" class="control-btn" title="Next"><i class="fas fa-step-forward"></i></button>
                    <button id="repeat" class="mode-btn" title="Repeat"><i class="fas fa-redo"></i></button>
                </div>

                <button id="stop" class="stop-btn">
                    <i class="fas fa-stop"></i> Parar Tocar
                </button>
            </section>

            <!-- Sidebar -->
            <aside class="sidebar">
                <div class="selection-area">
                    <h3><i class="fas fa-layer-group"></i> Estilos</h3>
                    <div class="select-box">
                        <div class="custom-dropdown" id="genre-dropdown">
                            <div class="dropdown-trigger">
                                <span id="selected-genre-text">Escolha um estilo...</span>
                                <i class="fas fa-chevron-down"></i>
                            </div>
                            <ul class="dropdown-options custom-scrollbar" id="genre-options">
                                <!-- Options will be injected here -->
                            </ul>
                        </div>
                        <button id="load-genre" class="action-btn">Listar</button>
                    </div>
                </div>

                <div class="playlist-area">
                    <h3><i class="fas fa-list-ul"></i> Playlist</h3>
                    <ul id="playlist" class="custom-scrollbar">
                        <!-- Musics go here -->
                    </ul>
                </div>
            </aside>
        </main>

        <footer>
            <p>Powered by <a href="https://github.com/furiousofnightgames" target="_blank"
                    style="text-decoration: none; color: var(--primary); font-weight: 600;">FURIOUSOFNIGHT</a></p>
        </footer>
    </div>

    <!-- Script -->
    <script src="/static/js/script.js"></script>
</body>

</html>
